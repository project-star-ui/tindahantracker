<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BentaTrack • Store Manager</title>
    
    <!-- PWA -->
    <meta name="theme-color" content="#FF0050">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBWQgSLhiVCSjRkrjPsip6tcBa4JfsvBko",
            authDomain: "messagingfun.firebaseapp.com",
            databaseURL: "https://messagingfun-default-rtdb.firebaseio.com",
            projectId: "messagingfun",
            storageBucket: "messagingfun.firebasestorage.app",
            messagingSenderId: "367300537898",
            appId: "1:367300537898:web:27fc389e88240be82f5d53"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.firebaseRefs = { ref, onValue, push, set, remove };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Poppins', sans-serif; }
        .tiktok-gradient { background: linear-gradient(135deg, #FF0050, #00F2EA); }
        .card-hover { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .card-hover:hover { transform: translateY(-8px) scale(1.02); }
        .modal { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popIn {
            0% { transform: scale(0.7) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .bottom-nav { box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <!-- [All your HTML content - same as before] -->
    <!-- Mobile Top Nav, Sidebar, Main Content, Pages, Bottom Nav, Floating Button, Quick Menu, Modal -->

    <!-- (To save space, I'm showing only the script part. Use the full body from my previous full code) -->

    <script>
        let salesEntries = [], savingsEntries = [], utangEntries = [];
        let currentModalType = 'sales';
        let currentPerson = null;

        function getTodayDate() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(page + '-page').classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if (document.getElementById('nav-' + page)) document.getElementById('nav-' + page).classList.add('active');
            document.querySelectorAll('[id^="bottom-nav-"]').forEach(b => b.classList.remove('text-white'));
            if (document.getElementById('bottom-nav-' + page)) document.getElementById('bottom-nav-' + page).classList.add('text-white');
            document.getElementById('page-title').textContent = page === 'dashboard' ? 'Dashboard' : page.charAt(0).toUpperCase() + page.slice(1);
        }

        function showQuickAddMenu() { document.getElementById('quick-add-menu').classList.toggle('hidden'); }
        function quickAdd(type) {
            document.getElementById('quick-add-menu').classList.add('hidden');
            showAddModal(type);
        }

        function showAddModal(type, personName = null) {
            currentModalType = type;
            currentPerson = personName;
            document.getElementById('add-modal').classList.remove('hidden');
            const content = document.getElementById('modal-content');
            const title = document.getElementById('modal-title');

            if (type === 'utang') {
                title.textContent = personName ? `Add to ${personName}` : "New Borrower";
                content.innerHTML = `<div class="space-y-8">
                    <div><label class="block text-sm text-zinc-400 mb-2">NAME</label><input type="text" id="modal-name" value="${personName || ''}" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg"></div>
                    <div><label class="block text-sm text-zinc-400 mb-2">ITEMS</label><textarea id="modal-items" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg h-24"></textarea></div>
                    <div><label class="block text-sm text-zinc-400 mb-2">AMOUNT (₱)</label><input type="number" id="modal-amount" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-4xl font-mono"></div>
                </div>`;
            } else if (type === 'sales') {
                title.textContent = "New Sale";
                content.innerHTML = `<div class="space-y-8">
                    <div><label class="block text-sm text-zinc-400 mb-2">DATE</label><input type="date" id="modal-date" value="${getTodayDate()}" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg"></div>
                    <div><label class="block text-sm text-zinc-400 mb-2">INCOME</label><input type="number" id="modal-income" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-4xl font-mono"></div>
                    <div><label class="block text-sm text-zinc-400 mb-2">BAWAS</label><input type="number" id="modal-bawas" value="0" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-4xl font-mono"></div>
                </div>`;
            } else if (type === 'savings') {
                title.textContent = "Add Savings";
                content.innerHTML = `<div class="space-y-8">
                    <div><label class="block text-sm text-zinc-400 mb-2">DATE</label><input type="date" id="modal-date" value="${getTodayDate()}" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg"></div>
                    <div><label class="block text-sm text-zinc-400 mb-2">AMOUNT</label><input type="number" id="modal-amount" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-4xl font-mono"></div>
                </div>`;
            }
        }

        function hideAddModal() {
            document.getElementById('add-modal').classList.add('hidden');
        }

        function saveCurrentEntry() {
            const { ref, push } = window.firebaseRefs || {};
            const date = getTodayDate();

            if (currentModalType === 'utang') {
                const name = document.getElementById('modal-name').value.trim();
                const items = document.getElementById('modal-items').value.trim();
                const amount = parseFloat(document.getElementById('modal-amount').value) || 0;
                if (!name || !items || amount <= 0) return alert("Please fill all fields");
                push(ref(window.db, 'utang'), { date, name, items, amount });
            } else if (currentModalType === 'sales') {
                const income = parseFloat(document.getElementById('modal-income').value) || 0;
                const bawas = parseFloat(document.getElementById('modal-bawas').value) || 0;
                push(ref(window.db, 'sales'), { date, income, bawas });
            } else if (currentModalType === 'savings') {
                const amount = parseFloat(document.getElementById('modal-amount').value) || 0;
                if (amount > 0) push(ref(window.db, 'savings'), { date, amount });
            }
            hideAddModal();
        }

        // Render functions
        function renderDashboard() {
            const totalSales = salesEntries.reduce((sum, e) => sum + (e.income || 0), 0);
            const totalBawas = salesEntries.reduce((sum, e) => sum + (e.bawas || 0), 0);
            const net = totalSales - totalBawas;
            const savings = savingsEntries.reduce((sum, e) => sum + (e.amount || 0), 0);

            document.getElementById('dash-total-sales').textContent = '₱' + Math.round(totalSales).toLocaleString();
            document.getElementById('dash-net-sales').textContent = '₱' + Math.round(net).toLocaleString();
            document.getElementById('dash-total-savings').textContent = '₱' + Math.round(savings).toLocaleString();
            document.getElementById('dash-net-balance').textContent = '₱' + Math.round(net).toLocaleString();
        }

        function renderSales() {
            const tbody = document.getElementById('sales-body');
            let html = '';
            [...salesEntries].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(e => {
                const net = (e.income || 0) - (e.bawas || 0);
                html += `<tr class="hover:bg-zinc-800"><td class="p-5">${new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td>
                <td class="p-5 text-right text-emerald-400">₱${(e.income||0).toLocaleString()}</td>
                <td class="p-5 text-right text-orange-400">₱${(e.bawas||0).toLocaleString()}</td>
                <td class="p-5 text-right font-semibold ${net>=0?'text-cyan-400':'text-red-400'}">₱${net.toLocaleString()}</td>
                <td class="p-5"><button onclick="deleteEntry('sales','${e.key}')" class="text-red-400"><i class="fa-solid fa-trash"></i></button></td></tr>`;
            });
            tbody.innerHTML = html || `<tr><td colspan="5" class="p-12 text-center text-zinc-500">No sales yet</td></tr>`;
        }

        function renderUtang() {
            const container = document.getElementById('utang-container');
            const grouped = {};
            utangEntries.forEach(e => { if (!grouped[e.name]) grouped[e.name] = []; grouped[e.name].push(e); });

            let html = '';
            Object.keys(grouped).sort().forEach(name => {
                const list = grouped[name];
                const total = list.reduce((sum, i) => sum + parseFloat(i.amount||0), 0);
                let rows = list.map(item => `
                    <div class="flex justify-between bg-zinc-800 p-4 rounded-2xl mb-3">
                        <div><div class="text-xs text-zinc-400">${new Date(item.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div><div>${item.items}</div></div>
                        <div class="text-right"><div class="font-mono text-pink-400">₱${parseFloat(item.amount).toLocaleString()}</div>
                        <button onclick="deleteEntry('utang','${item.key}')" class="text-red-400 text-xs">Delete</button></div>
                    </div>`).join('');
                html += `<div class="bg-zinc-900 border border-pink-500/30 rounded-3xl p-6">
                    <div class="flex justify-between mb-4"><h3 class="text-2xl font-bold">${name}</h3><div class="text-right"><div class="text-xs text-pink-400">TOTAL</div><div class="text-3xl font-bold text-pink-400">₱${total.toLocaleString()}</div></div></div>
                    ${rows}
                    <div class="grid grid-cols-2 gap-3 mt-6">
                        <button onclick="addItemTo('${name}')" class="py-4 bg-gradient-to-r from-pink-500 to-cyan-500 rounded-3xl">+ Add Item</button>
                        <button onclick="markAsPaid('${name}')" class="py-4 border border-emerald-400 text-emerald-400 rounded-3xl">✅ Mark Paid</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html || `<p class="text-center text-zinc-500 py-20">No utang yet</p>`;
        }

        function renderSavings() {
            const tbody = document.getElementById('savings-body');
            let html = '';
            [...savingsEntries].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(e => {
                html += `<tr class="hover:bg-zinc-800"><td class="p-5">${new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td>
                <td class="p-5 text-right font-mono text-emerald-400">₱${parseFloat(e.amount||0).toLocaleString()}</td>
                <td class="p-5 text-center"><button onclick="deleteEntry('savings','${e.key}')" class="text-red-400"><i class="fa-solid fa-trash"></i></button></td></tr>`;
            });
            tbody.innerHTML = html || `<tr><td colspan="3" class="p-12 text-center text-zinc-500">No savings yet</td></tr>`;
        }

        function renderAll() {
            renderDashboard();
            renderSales();
            renderUtang();
            renderSavings();
        }

        function initFirebase() {
            if (!window.firebaseRefs) return setTimeout(initFirebase, 500);
            const { ref, onValue } = window.firebaseRefs;
            onValue(ref(window.db, 'sales'), s => { salesEntries = s.exists() ? Object.entries(s.val()).map(([k,v]) => ({key:k, ...v})) : []; renderAll(); });
            onValue(ref(window.db, 'utang'), s => { utangEntries = s.exists() ? Object.entries(s.val()).map(([k,v]) => ({key:k, ...v})) : []; renderAll(); });
            onValue(ref(window.db, 'savings'), s => { savingsEntries = s.exists() ? Object.entries(s.val()).map(([k,v]) => ({key:k, ...v})) : []; renderAll(); });
        }

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(err => console.log(err));
        }

        window.onload = () => {
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            navigateTo('dashboard');
            initFirebase();
        };

        window.navigateTo = navigateTo;
        window.showQuickAddMenu = showQuickAddMenu;
        window.quickAdd = quickAdd;
        window.showAddModal = showAddModal;
        window.hideAddModal = hideAddModal;
        window.saveCurrentEntry = saveCurrentEntry;
        window.addItemTo = addItemTo;
        window.markAsPaid = markAsPaid;
        window.deleteEntry = deleteEntry;
    </script>
</body>
</html>
